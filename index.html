<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="全栈开发实验室官网，展示前端、后端、移动端、嵌入式方向的研究、培养与实践。"
    />
    <meta property="og:title" content="开发实验室官网" />
    <meta property="og:description" content="Code the Future. 技术驱动创新。" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#0A0A0A" />
    <title>开发实验室官网</title>
    <script>
      (function () {
        var key = "lab-theme";
        var saved = window.localStorage.getItem(key);
        var prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
        var theme = saved === "light" || saved === "dark" ? saved : prefersLight ? "light" : "dark";
        document.documentElement.classList.add(theme);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
